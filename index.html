<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aura Lounge Bar · Painel de Reservas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --tan:#c18c46;            /* cor exata da identidade */
    --tan-deep:#a5742f;
    --tan-soft:#d6ac6e;
    --board:#efe6d6;          /* fundo claro derivado do bege */
    --card:#ffffff;
    --ink:#3a2f22;
    --ink-soft:#8c7c64;
    --line:rgba(58,47,34,.12);
    --line-tan:rgba(165,116,47,.30);
    --shadow:0 14px 40px -22px rgba(80,55,20,.5);
    --ok:#5b8a3c;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Jost',sans-serif;color:var(--ink);background:var(--board);min-height:100vh;-webkit-font-smoothing:antialiased}
  .upper{text-transform:uppercase;letter-spacing:.18em}

  /* ---------- LOGIN ---------- */
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--tan);padding:24px}
  #login .box{width:100%;max-width:360px;text-align:center}
  #login img{width:230px;max-width:75%;margin:0 auto 30px;display:block}
  #login .card{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.35);border-radius:16px;padding:28px 24px;backdrop-filter:blur(4px);text-align:left}
  #login label{color:#fff;opacity:.9}
  #login input{background:rgba(255,255,255,.92)}
  #login .err{color:#5a1208;background:rgba(255,255,255,.7);border-radius:8px;padding:0;font-size:.8rem;margin-top:10px;text-align:center;min-height:1em}
  #login .err:not(:empty){padding:8px}

  label{display:block;font-size:.64rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:7px;font-weight:500}
  input,select,textarea{width:100%;background:#fff;border:1px solid var(--line);border-radius:10px;color:var(--ink);font-family:'Jost';font-size:.96rem;padding:12px 13px;transition:.2s}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--tan);box-shadow:0 0 0 3px rgba(193,140,70,.16)}
  textarea{resize:vertical;min-height:70px}
  .field{margin-bottom:15px}

  .btn{cursor:pointer;border:none;border-radius:11px;padding:13px 20px;font-family:'Jost';font-weight:500;font-size:.74rem;letter-spacing:.14em;text-transform:uppercase;color:#fff;background:var(--tan);transition:.2s}
  .btn:hover{background:var(--tan-deep);transform:translateY(-1px)}
  .btn.block{width:100%;margin-top:6px}
  .btn.ghost{background:transparent;border:1px solid rgba(255,255,255,.5);color:#fff}
  .btn.ghost:hover{background:rgba(255,255,255,.12)}
  .btn.outline{background:transparent;border:1px solid var(--line-tan);color:var(--tan-deep)}
  .btn.outline:hover{background:rgba(193,140,70,.08);transform:none}
  .btn.danger{background:transparent;border:1px solid rgba(150,40,30,.3);color:#9c3a2a}
  .btn.danger:hover{background:rgba(150,40,30,.06);transform:none}

  /* ---------- HEADER ---------- */
  header.bar{background:var(--tan);padding:16px clamp(16px,4vw,36px);display:flex;align-items:center;gap:18px;position:sticky;top:0;z-index:20;box-shadow:0 6px 20px -12px rgba(80,55,20,.6)}
  header.bar img{height:38px}
  header.bar .ttl{color:#fff;font-size:.66rem;letter-spacing:.34em;text-transform:uppercase;opacity:.92;border-left:1px solid rgba(255,255,255,.4);padding-left:18px}
  header.bar .sp{flex:1}
  header.bar .btn{padding:11px 18px}
  .icon-plus{font-size:1rem;margin-right:6px;font-weight:300}

  /* ---------- BOARD ---------- */
  .board-wrap{padding:clamp(16px,4vw,30px)}
  .board-head{display:flex;align-items:center;gap:14px;margin-bottom:20px;flex-wrap:wrap}
  .board-head h1{font-weight:400;font-size:1.5rem;letter-spacing:.02em}
  .board-head .hint{color:var(--ink-soft);font-size:.85rem}
  .board{display:flex;gap:18px;overflow-x:auto;padding-bottom:18px;scroll-snap-type:x proximity}
  .board::-webkit-scrollbar{height:8px}
  .board::-webkit-scrollbar-thumb{background:var(--tan-soft);border-radius:8px}
  .col{flex:0 0 300px;scroll-snap-align:start;background:rgba(255,255,255,.45);border:1px solid var(--line);border-radius:16px;padding:14px;max-height:calc(100vh - 200px);display:flex;flex-direction:column}
  .col.current{border-color:var(--tan);box-shadow:0 0 0 2px rgba(193,140,70,.18)}
  .col h2{font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--tan-deep);font-weight:600;display:flex;align-items:center;gap:8px;padding:4px 4px 12px}
  .col h2 .cnt{margin-left:auto;font-size:.62rem;color:var(--ink-soft);font-weight:400;letter-spacing:.08em;background:rgba(193,140,70,.12);padding:2px 8px;border-radius:20px}
  .days{display:flex;flex-direction:column;gap:9px;overflow-y:auto;padding-right:2px}
  .days::-webkit-scrollbar{width:5px}.days::-webkit-scrollbar-thumb{background:var(--tan-soft);border-radius:5px}
  .day{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;cursor:pointer;transition:.18s;display:flex;align-items:center;gap:12px}
  .day:hover{border-color:var(--tan);transform:translateY(-1px);box-shadow:var(--shadow)}
  .day .date{flex:none;width:48px;text-align:center}
  .day .wd{font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--tan-deep)}
  .day .dn{font-size:1.6rem;font-weight:500;line-height:.95;color:var(--ink)}
  .day .meta{flex:1;border-left:1px solid var(--line);padding-left:12px}
  .day .meta .r{font-size:.92rem;font-weight:500}
  .day .meta .p{font-size:.76rem;color:var(--ink-soft);margin-top:2px}
  .day .today-badge{font-size:.54rem;letter-spacing:.12em;text-transform:uppercase;background:var(--tan);color:#fff;padding:2px 7px;border-radius:20px;align-self:flex-start}
  .day.is-today{border-color:var(--tan);box-shadow:0 0 0 2px rgba(193,140,70,.2)}
  .col-empty{color:var(--ink-soft);font-size:.84rem;text-align:center;padding:20px 8px;font-style:italic}

  .board-empty{text-align:center;padding:70px 20px;color:var(--ink-soft)}
  .board-empty .lg{font-size:1.3rem;color:var(--tan-deep);margin-bottom:8px}
  .loading{text-align:center;padding:60px;color:var(--ink-soft)}

  /* ---------- MODAL ---------- */
  .overlay{position:fixed;inset:0;background:rgba(40,28,12,.5);backdrop-filter:blur(3px);display:none;align-items:flex-start;justify-content:center;padding:5vh 16px;z-index:40;overflow-y:auto}
  .overlay.show{display:flex}
  .modal{background:var(--board);border-radius:20px;width:100%;max-width:480px;box-shadow:var(--shadow);animation:pop .25s ease both;overflow:hidden}
  .modal .m-head{background:var(--tan);color:#fff;padding:20px 24px;display:flex;align-items:center;gap:12px}
  .modal .m-head .mt{font-size:.66rem;letter-spacing:.22em;text-transform:uppercase;opacity:.85}
  .modal .m-head .md{font-size:1.3rem;font-weight:400;margin-top:2px}
  .modal .m-head .x{margin-left:auto;background:rgba(255,255,255,.15);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1.1rem;line-height:1}
  .modal .m-head .x:hover{background:rgba(255,255,255,.28)}
  .modal .m-body{padding:22px 24px}

  .res-item{background:#fff;border:1px solid var(--line);border-radius:13px;padding:14px 16px;margin-bottom:11px}
  .res-item .top{display:flex;align-items:flex-start;gap:10px}
  .res-item .nm{font-size:1.12rem;font-weight:500;line-height:1.1}
  .res-item .pp{flex:none;background:rgba(193,140,70,.14);color:var(--tan-deep);font-size:.74rem;padding:4px 10px;border-radius:20px;white-space:nowrap}
  .res-item .obs{margin-top:8px;font-size:.86rem;color:var(--ink-soft);line-height:1.4;background:var(--board);border-radius:8px;padding:8px 10px}
  .res-item .obs b{color:var(--ink);font-weight:500}
  .res-item .acts{display:flex;gap:7px;margin-top:11px}
  .res-item .acts .btn{padding:7px 13px;font-size:.64rem}
  .day-empty{text-align:center;color:var(--ink-soft);font-style:italic;padding:14px 0 20px}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(150%);background:var(--ink);color:#fff;padding:13px 24px;border-radius:30px;font-size:.85rem;z-index:60;transition:.4s cubic-bezier(.2,1,.3,1)}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .banner{background:#fff;border-left:5px solid var(--tan);border-radius:10px;padding:14px 18px;margin:0 0 18px;font-size:.88rem;line-height:1.5}

  @keyframes pop{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @media(max-width:600px){.col{flex-basis:84vw}}
</style>
</head>

<script type="module">
/* ===== CONFIG FIREBASE (mesmo projeto já existente) ===== */
const firebaseConfig = {
  apiKey: "AIzaSyCCcJDp696wUvxDjXO-gDl51fa0aWSwRrM",
  authDomain: "aura-reservas-9f4e8.firebaseapp.com",
  projectId: "aura-reservas-9f4e8",
  storageBucket: "aura-reservas-9f4e8.firebasestorage.app",
  messagingSenderId: "1049116561059",
  appId: "1:1049116561059:web:efa93865e4439ac173f916"
};
const COLLECTION = "reservas_geral";   // coleção nova -> Dia dos Namorados fica arquivado em "reservas"

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const $ = s => document.querySelector(s);
const NOT_CONFIGURED = firebaseConfig.apiKey.startsWith("COLE_");

const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const WD = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const WDL = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];

let reservas = [];
let editId = null, formDate = null, openDayStr = null;
let db=null, auth=null, unsub=null;

function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500);}
function esc(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function parseD(s){const a=String(s).split('-').map(Number);return new Date(a[0],a[1]-1,a[2]);}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmtFull(s){const d=parseD(s);return WDL[d.getDay()]+', '+d.getDate()+' de '+MESES[d.getMonth()]+' de '+d.getFullYear();}

/* ---------- init ---------- */
if(NOT_CONFIGURED){
  $('#app').style.display='block';
  $('#config-banner').innerHTML='<div class="banner"><b>Firebase não configurado.</b> Cole a configuração no topo do index.html.</div>';
  $('#board').innerHTML='';
}else{
  const fb=initializeApp(firebaseConfig);
  auth=getAuth(fb); db=getFirestore(fb);
  onAuthStateChanged(auth,u=>{
    if(u){ $('#login').style.display='none'; $('#app').style.display='block'; listen(); }
    else { $('#login').style.display='flex'; $('#app').style.display='none'; if(unsub){unsub();unsub=null;} }
  });
  $('#l-btn').addEventListener('click', doLogin);
  $('#l-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
  $('#btn-logout').addEventListener('click',()=>signOut(auth));
}

async function doLogin(){
  $('#l-err').textContent='';
  const email=$('#l-email').value.trim(), pass=$('#l-pass').value;
  if(!email||!pass){$('#l-err').textContent='Preencha e-mail e senha.';return;}
  try{ await signInWithEmailAndPassword(auth,email,pass); }
  catch(e){
    const map={'auth/invalid-credential':'E-mail ou senha incorretos.','auth/operation-not-allowed':'Ative Email/senha no Authentication.','auth/unauthorized-domain':'Domínio não autorizado (Authentication → Settings → Authorized domains).','auth/network-request-failed':'Falha de rede.'};
    $('#l-err').textContent=map[e.code]||('Erro: '+(e.code||e.message));
  }
}

function listen(){
  if(unsub)return;
  unsub=onSnapshot(collection(db,COLLECTION),snap=>{
    reservas=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderBoard();
    if(openDayStr && $('#dayOverlay').classList.contains('show')) fillDay(openDayStr);
  },err=>toast('Erro ao carregar (verifique as regras do Firestore).'));
}

/* ---------- board ---------- */
function renderBoard(){
  const board=$('#board');
  const total=reservas.length;
  const totalP=reservas.reduce((s,r)=>s+Number(r.pessoas||0),0);
  $('#board-hint').textContent = total ? `${total} reservas · ${totalP} pessoas` : '';

  if(!total){
    board.innerHTML='<div class="board-empty"><div class="lg">Nenhuma reserva ainda</div><div>Clique em “Nova reserva” para começar.</div></div>';
    return;
  }
  // agrupar por mês -> dia
  const months={};
  for(const r of reservas){
    if(!r.data) continue;
    const mk=r.data.slice(0,7);
    (months[mk]=months[mk]||{})[r.data]=(months[mk][r.data]||[]);
    months[mk][r.data].push(r);
  }
  const today=todayStr(); const curMonth=today.slice(0,7);
  const mkeys=Object.keys(months).sort();
  board.innerHTML=mkeys.map(mk=>{
    const [y,m]=mk.split('-').map(Number);
    const days=Object.keys(months[mk]).sort();
    const mp=days.reduce((s,d)=>s+months[mk][d].reduce((a,r)=>a+Number(r.pessoas||0),0),0);
    const cur = mk===curMonth ? ' current':'';
    const dayCards=days.map(ds=>{
      const list=months[mk][ds]; const d=parseD(ds);
      const p=list.reduce((a,r)=>a+Number(r.pessoas||0),0);
      const isToday = ds===today;
      return `<div class="day${isToday?' is-today':''}" onclick="openDay('${ds}')">
        <div class="date"><div class="wd">${WD[d.getDay()]}</div><div class="dn">${d.getDate()}</div></div>
        <div class="meta"><div class="r">${list.length} ${list.length>1?'reservas':'reserva'}</div><div class="p">${p} ${p>1?'pessoas':'pessoa'}</div></div>
        ${isToday?'<div class="today-badge">Hoje</div>':''}
      </div>`;
    }).join('');
    return `<div class="col${cur}" data-month="${mk}">
      <h2>${MESES[m-1]} ${y} <span class="cnt">${days.length} ${days.length>1?'dias':'dia'} · ${mp} pess.</span></h2>
      <div class="days">${dayCards}</div>
    </div>`;
  }).join('');
}

window.openDay=function(ds){ openDayStr=ds; fillDay(ds); $('#dayOverlay').classList.add('show'); };
window.closeDay=function(){ $('#dayOverlay').classList.remove('show'); openDayStr=null; };

function fillDay(ds){
  $('#day-title').textContent=fmtFull(ds);
  const list=reservas.filter(r=>r.data===ds).sort((a,b)=>(a.responsavel||'').localeCompare(b.responsavel||''));
  const box=$('#day-list');
  if(!list.length){ box.innerHTML='<div class="day-empty">Sem reservas neste dia.</div>'; }
  else box.innerHTML=list.map(r=>`
    <div class="res-item">
      <div class="top">
        <div class="nm">${esc(r.responsavel)}</div>
        <div class="pp">${Number(r.pessoas||0)} ${Number(r.pessoas||0)>1?'pessoas':'pessoa'}</div>
      </div>
      ${r.observacoes?`<div class="obs"><b>Obs.:</b> ${esc(r.observacoes)}</div>`:''}
      <div class="acts">
        <button class="btn outline" onclick="editRes('${r.id}')">Editar</button>
        <button class="btn danger" onclick="delRes('${r.id}')">Excluir</button>
      </div>
    </div>`).join('');
  $('#btn-add-day').onclick=()=>{ formDate=ds; openRes(); };
}

/* ---------- form ---------- */
function openRes(){
  $('#resOverlay').classList.add('show');
  $('#r-data').value = formDate || todayStr();
  if(!editId){ $('#res-mode').textContent='Nova reserva'; $('#btn-del').style.display='none'; }
}
window.closeRes=function(){ $('#resOverlay').classList.remove('show'); editId=null; formDate=null;
  $('#r-nome').value=''; $('#r-pessoas').value=''; $('#r-obs').value=''; };

window.editRes=function(id){
  const r=reservas.find(x=>x.id===id); if(!r)return;
  editId=id; formDate=r.data;
  $('#res-mode').textContent='Editar reserva';
  $('#r-data').value=r.data; $('#r-nome').value=r.responsavel||''; $('#r-pessoas').value=r.pessoas||''; $('#r-obs').value=r.observacoes||'';
  $('#btn-del').style.display='block';
  $('#resOverlay').classList.add('show');
};

window.delRes=async function(id){
  const r=reservas.find(x=>x.id===id); if(!r)return;
  if(!confirm(`Excluir a reserva de ${r.responsavel}?`))return;
  try{ await deleteDoc(doc(db,COLLECTION,id)); toast('Reserva excluída.'); if(editId===id)closeRes(); }
  catch(e){ toast('Erro ao excluir.'); }
};

async function saveRes(){
  if(NOT_CONFIGURED){toast('Configure o Firebase.');return;}
  const data=$('#r-data').value;
  const responsavel=$('#r-nome').value.trim();
  const pessoas=Math.max(1,Math.floor(Number($('#r-pessoas').value)||0));
  const observacoes=$('#r-obs').value.trim();
  if(!data){toast('Escolha a data.');return;}
  if(!responsavel){toast('Informe o responsável.');$('#r-nome').focus();return;}
  if(!$('#r-pessoas').value){toast('Informe a quantidade de pessoas.');$('#r-pessoas').focus();return;}
  try{
    if(editId){ await updateDoc(doc(db,COLLECTION,editId),{data,responsavel,pessoas,observacoes}); toast('Reserva atualizada.'); }
    else { await addDoc(collection(db,COLLECTION),{data,responsavel,pessoas,observacoes,criadoEm:serverTimestamp()}); toast('Reserva criada.'); }
    const keep=data; closeRes(); openDayStr=keep;
  }catch(e){ toast('Erro ao salvar.'); }
}

/* ---------- buttons ---------- */
$('#btn-new').addEventListener('click',()=>{ editId=null; formDate=todayStr(); openRes(); });
$('#btn-save').addEventListener('click',saveRes);
$('#btn-del').addEventListener('click',()=>{ if(editId) delRes(editId); });
$('#btn-today').addEventListener('click',()=>{
  const cur=document.querySelector('.col.current'); if(cur) cur.scrollIntoView({behavior:'smooth',inline:'start',block:'nearest'});
  const t=document.querySelector('.day.is-today'); if(t){ t.style.transition='box-shadow .3s'; }
});
[$('#dayOverlay'),$('#resOverlay')].forEach(o=>o.addEventListener('click',e=>{ if(e.target===o){ o.classList.remove('show'); if(o.id==='resOverlay')closeRes(); else closeDay(); } }));
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ $('#resOverlay').classList.remove('show'); $('#dayOverlay').classList.remove('show'); } });
</script>
</body>
</html>
